<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <header id="topbar-mount"></header>
    <div id="main" style="display:flex; flex:1; overflow:hidden;">
      <nav id="sessions-mount" style="display:flex; flex-shrink:0;"></nav>
      <main id="feed-mount" style="flex:1; display:flex; flex-direction:column;">
        <div class="feed-empty">Select a session to view its feed</div>
      </main>
    </div>
    <footer id="statusbar">
      <div class="sb-item">
        <span class="sb-dot connected" id="conn-dot"></span>
        <span id="conn-indicator" class="connected">CONNECTED</span>
      </div>
      <div class="sb-item" id="sb-host"></div>
      <div class="sb-item"><span id="sb-events" style="font-weight:600;color:var(--text)">0</span>&nbsp;EVENTS</div>
      <div class="sb-spacer"></div>
      <div class="sb-item" id="sb-version"></div>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
