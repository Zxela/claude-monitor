name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build frontend
        run: cd web && npm ci && npm run build

      - name: Frontend type check
        run: cd web && npx tsc --noEmit

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check no debug code
        run: |
          if grep -rn 'fmt\.Println\|log\.Fatal\b' internal/ cmd/ --include='*.go' | grep -v '_test.go' | grep -v 'log.Fatalf'; then
            echo "WARNING: Found debug print statements"
          fi

  # Create or update the release PR on pushes to main
  release-please:
    if: github.ref == 'refs/heads/main'
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Enable auto-merge so it merges once CI passes on the PR itself
      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge --repo ${{ github.repository }} --auto --merge \
            ${{ fromJSON(steps.release.outputs.prs)[0].number }}
