name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build frontend
        run: cd web && npm ci && npm run build

      - name: Frontend type check
        run: cd web && npx tsc --noEmit

      - name: Frontend lint
        run: cd web && npm run lint

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check no debug code
        run: |
          if grep -rn 'fmt\.Println' internal/ --include='*.go' | grep -v '_test.go'; then
            echo "::error::Found fmt.Println debug statements in internal/"
            exit 1
          fi

      - name: Create embed placeholder
        run: mkdir -p cmd/claude-monitor/static && echo '<!doctype html>' > cmd/claude-monitor/static/index.html

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
        continue-on-error: false

      - name: Security scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true  # informational — stdlib vulns may not have patches yet

  # Create or update the release PR on pushes to main
  release-please:
    permissions:
      contents: write
      pull-requests: write
    if: github.ref == 'refs/heads/main'
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and upload binaries when release-please creates a release
  build-binaries:
    permissions:
      contents: write
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binaries
        run: |
          VERSION="${TAG_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-amd64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-arm64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-amd64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-arm64 ./cmd/claude-monitor

          cd dist
          for bin in claude-monitor-*; do
            chmod +x "$bin"
            # Rename to plain "claude-monitor" so Homebrew's bin.install works
            cp "$bin" claude-monitor
            tar czf "${bin}.tar.gz" claude-monitor
            rm claude-monitor
          done
          sha256sum *.tar.gz > checksums.txt

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ env.TAG_NAME }} \
            dist/*.tar.gz \
            dist/checksums.txt \
            --repo ${{ github.repository }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION="${TAG_NAME}"
          VERSION_NUM="${VERSION#v}"

          # Read checksums
          DARWIN_AMD64=$(grep darwin-amd64 dist/checksums.txt | awk '{print $1}')
          DARWIN_ARM64=$(grep darwin-arm64 dist/checksums.txt | awk '{print $1}')
          LINUX_AMD64=$(grep linux-amd64 dist/checksums.txt | awk '{print $1}')
          LINUX_ARM64=$(grep linux-arm64 dist/checksums.txt | awk '{print $1}')

          # Update formula in-place
          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" Formula/claude-monitor.rb
          sed -i "/darwin-amd64/{n;s/sha256 \".*\"/sha256 \"${DARWIN_AMD64}\"/}" Formula/claude-monitor.rb
          sed -i "/darwin-arm64/{n;s/sha256 \".*\"/sha256 \"${DARWIN_ARM64}\"/}" Formula/claude-monitor.rb
          sed -i "/linux-amd64/{n;s/sha256 \".*\"/sha256 \"${LINUX_AMD64}\"/}" Formula/claude-monitor.rb
          sed -i "/linux-arm64/{n;s/sha256 \".*\"/sha256 \"${LINUX_ARM64}\"/}" Formula/claude-monitor.rb

          # Update formula in this repo via PR (not direct push to main)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-formula-${VERSION}"
          git checkout -b "${BRANCH}"
          git add Formula/claude-monitor.rb
          git commit -m "chore: update Homebrew formula for ${VERSION}"

          git push origin "${BRANCH}"

          # Create PR only if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create --title "chore: update Homebrew formula for ${VERSION}" \
              --body "Auto-generated formula update for ${VERSION}" \
              --base main --head "${BRANCH}"
          else
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}, skipping creation"
          fi

          # Update the Homebrew tap repo using HOMEBREW_TAP_PAT (a PAT with write access
          # to Zxela/homebrew-tap — github.token is scoped to this repo only).
          # Add secret HOMEBREW_TAP_PAT to this repo's settings to enable tap updates.
          if [ -z "${HOMEBREW_TAP_PAT}" ]; then
            echo "::error::HOMEBREW_TAP_PAT secret is not set — tap repo was NOT updated. Add a PAT with write access to Zxela/homebrew-tap as a repository secret named HOMEBREW_TAP_PAT."
            exit 1
          fi

          git clone https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/Zxela/homebrew-tap.git /tmp/tap
          cp Formula/claude-monitor.rb /tmp/tap/Formula/claude-monitor.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-monitor.rb
          if git diff --cached --quiet; then
            echo "No tap formula changes to commit"
          else
            git commit -m "Update claude-monitor to ${VERSION}"
            git push origin main
          fi
