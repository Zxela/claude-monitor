name: Build Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./... -count=1

      - name: Check HTML sync
        run: diff static/index.html cmd/claude-monitor/static/index.html

      - name: Build binaries
        run: |
          VERSION=${{ github.event.release.tag_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-amd64 ./cmd/claude-monitor
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-arm64 ./cmd/claude-monitor
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-amd64 ./cmd/claude-monitor
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-arm64 ./cmd/claude-monitor

          cd dist && sha256sum * > checksums.txt

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claude-monitor-linux-amd64
            dist/claude-monitor-linux-arm64
            dist/claude-monitor-darwin-amd64
            dist/claude-monitor-darwin-arm64
            dist/checksums.txt
