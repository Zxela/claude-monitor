name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create tag and GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          VERSION=$(echo "${PR_TITLE}" | grep -oP '\d+\.\d+\.\d+')
          TAG_NAME="v${VERSION}"

          # Skip if release already exists (idempotent)
          if gh release view "${TAG_NAME}" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release ${TAG_NAME} already exists, skipping"
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            exit 0
          fi

          MERGE_SHA=${{ github.event.pull_request.merge_commit_sha }}

          # Create the tag
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${TAG_NAME}" \
            -f sha="${MERGE_SHA}" || true

          # Extract release notes from the PR body
          gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json body --jq '.body' > /tmp/release-notes.md

          # Create the GitHub release
          gh release create "${TAG_NAME}" \
            --repo ${{ github.repository }} \
            --title "${TAG_NAME}" \
            --notes-file /tmp/release-notes.md \
            --target "${MERGE_SHA}"

          # Mark release PR as tagged so release-please doesn't block
          gh pr edit ${PR_NUMBER} --repo ${{ github.repository }} \
            --remove-label "autorelease: pending" \
            --add-label "autorelease: tagged" || true

          echo "release_created=true" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

  build-binaries:
    needs: create-release
    if: ${{ needs.create-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binaries
        run: |
          VERSION=${{ needs.create-release.outputs.tag_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-amd64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-linux-arm64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-amd64 ./cmd/claude-monitor
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/claude-monitor-darwin-arm64 ./cmd/claude-monitor

          cd dist
          for bin in claude-monitor-*; do
            chmod +x "$bin"
            tar czf "${bin}.tar.gz" "$bin"
          done
          sha256sum *.tar.gz > checksums.txt

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.create-release.outputs.tag_name }} \
            dist/*.tar.gz \
            dist/checksums.txt \
            --repo ${{ github.repository }}
