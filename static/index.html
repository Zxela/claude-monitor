<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLAUDE MONITOR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --bg2:       #0f0f18;
    --bg3:       #13131f;
    --border:    #1e1e30;
    --border2:   #2a2a40;
    --text:      #e0e0e0;
    --text-dim:  #666680;
    --green:     #00ff88;
    --blue:      #4488ff;
    --yellow:    #ffcc00;
    --cyan:      #00ccff;
    --red:       #ff4444;
    --purple:    #cc88ff;
    --font:      'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.4;
  }

  body {
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 24px,
        rgba(255,255,255,0.012) 24px,
        rgba(255,255,255,0.012) 25px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.008) 39px,
        rgba(255,255,255,0.008) 40px
      );
  }

  /* ── Layout ─────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top Bar ─────────────────────────────────────────────── */
  #topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    height: 36px;
    padding: 0;
    user-select: none;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    border-right: 1px solid var(--border2);
    height: 100%;
    color: var(--green);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .brand-diamond {
    font-size: 16px;
    animation: diamondPulse 3s ease-in-out infinite;
  }

  @keyframes diamondPulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px var(--green)); }
    50%       { opacity: 0.6; filter: none; }
  }

  .topbar-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    border-right: 1px solid var(--border2);
    height: 100%;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: color 0.3s;
  }

  .topbar-stat .val {
    color: var(--text);
    font-weight: 600;
    font-size: 12px;
    transition: color 0.3s;
  }

  .topbar-stat .val.green  { color: var(--green); }
  .topbar-stat .val.yellow { color: var(--yellow); }
  .topbar-stat .val.cyan   { color: var(--cyan); }

  /* ── Main area ───────────────────────────────────────────── */
  #main {
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
  }

  /* ── Sessions Panel ──────────────────────────────────────── */
  #sessions-panel {
    flex: 0 0 30%;
    min-width: 220px;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border2);
    background: var(--bg2);
    overflow: hidden;
  }

  .panel-header {
    flex: 0 0 auto;
    padding: 7px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    text-transform: uppercase;
  }

  #session-filter-bar {
    display: flex;
    gap: 2px;
    padding: 4px 6px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 3px 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active {
    background: rgba(0,255,136,0.08);
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }
  .filter-btn span {
    opacity: 0.6;
    font-size: 8px;
  }

  .session-card .subagent-toggle {
    cursor: pointer;
    font-size: 10px;
    color: var(--text-dim);
    padding: 2px 4px;
    border: none;
    background: none;
    font-family: var(--font);
  }
  .session-card .subagent-toggle:hover { color: var(--text); }
  .subagent-count {
    font-size: 9px;
    color: var(--purple);
    opacity: 0.7;
  }

  #sessions-list {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 6px;
  }

  #sessions-list::-webkit-scrollbar { width: 4px; }
  #sessions-list::-webkit-scrollbar-track { background: transparent; }
  #sessions-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .session-card {
    padding: 10px 10px 8px;
    margin-bottom: 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg3);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .session-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--border2);
    transition: background 0.2s;
  }

  .session-card:hover {
    border-color: var(--border2);
    background: #16162a;
  }

  .session-card.selected {
    border-color: var(--blue);
    background: rgba(68, 136, 255, 0.06);
    box-shadow: 0 0 12px rgba(68, 136, 255, 0.1);
  }

  .session-card.selected::before { background: var(--blue); }

  .session-card.active::before { background: var(--green); }
  .session-card.selected.active::before { background: var(--green); }

  .session-row1 {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
  }

  .session-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: 0 0 auto;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .session-dot.active {
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .session-name {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .session-active-badge {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--green);
    padding: 1px 5px;
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 2px;
    background: rgba(0,255,136,0.05);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .session-status-badge {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 1px 5px;
    border-radius: 2px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  .status-thinking {
    color: var(--yellow);
    border: 1px solid rgba(255,204,0,0.3);
    background: rgba(255,204,0,0.05);
  }
  .status-tool_use {
    color: var(--blue);
    border: 1px solid rgba(0,136,255,0.3);
    background: rgba(0,136,255,0.05);
  }
  .status-waiting {
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.05);
  }
  .session-dot.thinking { background: var(--yellow); }
  .session-dot.tool { background: var(--blue); }

  .session-stats {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .session-stats .cost  { color: var(--yellow); }
  .session-stats .tok   { color: var(--cyan); }
  .session-stats .cache { color: var(--purple); }

  .session-meta {
    font-size: 10px;
    color: #44445a;
    display: flex;
    gap: 8px;
  }

  .session-meta .sid {
    font-family: var(--font);
    letter-spacing: 0.5px;
  }

  #no-sessions {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 40px 20px;
    letter-spacing: 1px;
  }

  /* ── Feed Panel ──────────────────────────────────────────── */
  #feed-panel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .feed-header {
    flex: 0 0 auto;
    padding: 7px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
  }

  #feed-filter-label {
    color: var(--blue);
    font-size: 10px;
  }

  #feed {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 0;
    font-family: var(--font);
    font-size: 12px;
  }

  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 2px 12px;
    border-left: 2px solid transparent;
    animation: fadeSlideIn 0.25s ease-out;
    transition: background 0.15s;
    line-height: 1.6;
  }

  .feed-entry:hover {
    background: rgba(255,255,255,0.03);
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fe-time {
    flex: 0 0 72px;
    color: #44445a;
    font-size: 11px;
    user-select: none;
  }

  .fe-type {
    flex: 0 0 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    user-select: none;
    padding-right: 8px;
  }

  .fe-type.user        { color: var(--blue); }
  .fe-type.assistant   { color: var(--green); }
  .fe-type.tool_use    { color: var(--yellow); }
  .fe-type.tool_result { color: var(--cyan); }
  .fe-type.error       { color: var(--red); }
  .fe-type.system      { color: var(--text-dim); }

  .feed-entry.type-user        { border-left-color: rgba(68,136,255,0.3); }
  .feed-entry.type-assistant   { border-left-color: rgba(0,255,136,0.25); }
  .feed-entry.type-tool_use    { border-left-color: rgba(255,204,0,0.3); }
  .feed-entry.type-tool_result { border-left-color: rgba(0,204,255,0.25); }
  .feed-entry.type-error       { border-left-color: rgba(255,68,68,0.4); }

  .feed-entry.tool-group-start {
    margin-bottom: 0;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
  .feed-entry.tool-group-end {
    margin-top: 0;
    padding-left: 28px;
    border-radius: 0 0 3px 3px;
    font-size: 11px;
    opacity: 0.75;
    border-left: 2px solid rgba(0,204,255,0.2);
  }

  .session-card.subagent {
    margin-left: 16px;
    border-left: 2px solid rgba(136, 0, 255, 0.4);
    opacity: 0.85;
    font-size: 0.95em;
  }

  .fe-content {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }

  .fe-content.dim  { color: var(--text-dim); }
  .fe-content.tool { color: var(--yellow); }
  .fe-content.result { color: var(--cyan); opacity: 0.85; }

  .fe-sid {
    flex: 0 0 60px;
    text-align: right;
    color: #33334a;
    font-size: 10px;
    letter-spacing: 0.5px;
    user-select: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #feed-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 60px 20px;
    letter-spacing: 1px;
    line-height: 2;
  }

  /* ── Status Bar ──────────────────────────────────────────── */
  #statusbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
    height: 26px;
    background: var(--bg3);
    border-top: 1px solid var(--border2);
    font-size: 11px;
    color: var(--text-dim);
    user-select: none;
  }

  .sb-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 100%;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .sb-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    transition: background 0.4s, box-shadow 0.4s;
  }

  .sb-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sb-dot.disconnected { background: var(--red); }

  #conn-label {
    font-weight: 600;
    transition: color 0.4s;
  }

  #conn-label.connected    { color: var(--green); }
  #conn-label.disconnected { color: var(--red); }

  .sb-spacer { flex: 1; }

  #event-count {
    font-weight: 600;
    color: var(--text);
  }

  /* ── Scroll-lock indicator ───────────────────────────────── */
  #scroll-lock-btn {
    position: fixed;
    bottom: 38px;
    right: 14px;
    background: rgba(68,136,255,0.15);
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
  }

  #scroll-lock-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  #scroll-lock-btn:hover {
    background: rgba(68,136,255,0.25);
  }

  /* ── Misc ────────────────────────────────────────────────── */
  .sep { color: var(--border2); }

  .flash {
    animation: flashVal 0.5s ease-out;
  }

  @keyframes flashVal {
    0%   { color: var(--green); }
    100% { color: inherit; }
  }

  .replay-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 10px;
    padding: 2px 6px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .replay-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
  }

  /* ── List View wrapper ───────────────────────────────────────── */
  #list-view {
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
  }

  /* ── View Toggle ─────────────────────────────────────────────── */
  .view-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 12px;
    border-right: 1px solid var(--border2);
    height: 100%;
  }

  .view-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 8px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }

  .view-btn:first-child {
    border-radius: 2px 0 0 2px;
    border-right: none;
  }

  .view-btn:last-child {
    border-radius: 0 2px 2px 0;
  }

  .view-btn.active {
    background: rgba(68,136,255,0.15);
    border-color: var(--blue);
    color: var(--blue);
  }

  .view-btn:hover:not(.active) {
    color: var(--text);
    border-color: var(--border2);
    background: rgba(255,255,255,0.05);
  }

  /* ── Pixel View ──────────────────────────────────────────────── */
  #pixel-view {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 16px;
  }

  #pixel-view::-webkit-scrollbar { width: 4px; }
  #pixel-view::-webkit-scrollbar-track { background: transparent; }
  #pixel-view::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .pixel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .agent-card {
    width: 160px;
    min-height: 200px;
    border: 1px solid #333;
    border-radius: 4px;
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px 10px;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    animation: fadein 0.3s ease;
    cursor: default;
  }

  @keyframes fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .agent-card[data-state="thinking"] {
    border-color: #0af;
    box-shadow: 0 0 10px rgba(0,170,255,0.15);
  }

  .agent-card[data-state="tool"] {
    border-color: #fa0;
    box-shadow: 0 0 10px rgba(255,170,0,0.15);
  }

  .agent-card[data-state="typing"] {
    border-color: #0a0;
    box-shadow: 0 0 10px rgba(0,170,0,0.15);
  }

  .agent-card[data-state="idle"] {
    border-color: #333;
  }

  .agent-card.dead {
    opacity: 0.5;
  }

  .sprite-container {
    width: 60px;
    height: 80px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    margin-bottom: 8px;
    overflow: visible;
  }

  .sprite {
    display: inline-block;
    width: 1px;
    height: 1px;
    transform: scale(3);
    transform-origin: top left;
    margin: 24px 18px 48px 18px;
    flex-shrink: 0;
  }

  .sprite.anim-thinking {
    animation: bob 1s ease-in-out infinite alternate;
  }

  .sprite.anim-tool {
    animation: reach 0.8s ease-in-out infinite alternate;
  }

  .sprite.anim-typing {
    animation: type-tap 0.4s ease-in-out infinite alternate;
  }

  @keyframes bob {
    from { transform: scale(3) translateY(0); }
    to   { transform: scale(3) translateY(-1px); }
  }

  @keyframes reach {
    from { transform: scale(3) translateX(0); }
    to   { transform: scale(3) translateX(1px); }
  }

  @keyframes type-tap {
    from { transform: scale(3); }
    to   { transform: scale(3) translateY(0.5px); }
  }

  .agent-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 140px;
    margin-bottom: 4px;
  }

  .agent-cost {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
  }

  .agent-cost.cost-green  { color: #0f6; }
  .agent-cost.cost-amber  { color: #fa0; }
  .agent-cost.cost-red    { color: #f44; }

  .agent-status {
    font-size: 10px;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 2px;
  }

  .agent-status.state-idle     { color: #666; }
  .agent-status.state-thinking { color: #0af; }
  .agent-status.state-tool     { color: #fa0; }
  .agent-status.state-typing   { color: #0a0; }

  .agent-tool {
    font-size: 10px;
    color: #fa0;
    text-align: center;
    letter-spacing: 0.5px;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top Bar -->
  <div id="topbar">
    <div class="topbar-brand">
      <span class="brand-diamond">◆</span>
      CLAUDE MONITOR
    </div>
    <div class="topbar-stat">
      <span>ACTIVE</span>
      <span class="val green" id="stat-sessions">0</span>
    </div>
    <div class="topbar-stat">
      <span>TOTAL SPEND</span>
      <span class="val yellow" id="stat-cost">$0.000</span>
    </div>
    <div class="topbar-stat">
      <span>ACTIVE COST</span>
      <span class="val cyan" id="stat-active-cost">$0.000</span>
    </div>
    <div class="topbar-stat">
      <span>CACHE HIT</span>
      <span class="val" id="stat-cache" style="color:var(--purple)">—</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-list" onclick="setView('list')">LIST</button>
      <button class="view-btn" id="btn-pixels" onclick="setView('pixels')">PIXELS</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Pixel View (hidden by default) -->
    <div id="pixel-view" style="display:none;">
      <div class="pixel-grid" id="pixel-grid"></div>
    </div>

    <!-- List View wrapper (sessions + feed + replay) -->
    <div id="list-view" style="display:flex; flex:1; overflow:hidden;">

      <!-- Sessions Panel -->
      <div id="sessions-panel">
        <div class="panel-header">SESSIONS</div>
        <div id="session-filter-bar">
          <button class="filter-btn active" data-filter="active" onclick="setSessionFilter('active')">Active <span id="filter-count-active">0</span></button>

// Frame alternation ticker
let _spriteFrame = 0;
function tickSprites() {
  _spriteFrame = (_spriteFrame + 1) % 2;
  if (state.currentView === 'pixels') {
    document.querySelectorAll('.agent-card').forEach(card => {
      const sid = card.dataset.id;
      const ss = sessionState[sid];
      if (!ss) return;
      const spriteEl = card.querySelector('.sprite');
      if (spriteEl) renderSprite(ss.state, spriteEl);
    });
  }
}
let spriteIntervalId = setInterval(tickSprites, 1000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(spriteIntervalId);
    spriteIntervalId = null;
  } else if (!spriteIntervalId) {
    spriteIntervalId = setInterval(tickSprites, 1000);
  }
});

function renderSprite(spriteState, el) {
  const frames = SPRITES[spriteState] || SPRITES.idle;
  el.style.boxShadow = frames[_spriteFrame % frames.length];
  // Set animation class
  el.className = 'sprite';
  if (spriteState === 'thinking') el.classList.add('anim-thinking');
  else if (spriteState === 'tool')     el.classList.add('anim-tool');
  else if (spriteState === 'typing')   el.classList.add('anim-typing');
}

// ── View switching ─────────────────────────────────────────────
function setView(view) {
  state.currentView = view;
  const listView   = document.getElementById('list-view');
  const pixelView  = document.getElementById('pixel-view');
  const btnList    = document.getElementById('btn-list');
  const btnPixels  = document.getElementById('btn-pixels');

  if (view === 'pixels') {
    listView.style.display  = 'none';
    pixelView.style.display = 'flex';
    btnList.classList.remove('active');
    btnPixels.classList.add('active');
    renderPixelView();
  } else {
    listView.style.display  = 'flex';
    pixelView.style.display = 'none';
    btnList.classList.add('active');
    btnPixels.classList.remove('active');
  }
}

// ── Pixel view rendering ───────────────────────────────────────
const STATE_LABELS = {
  idle: '● IDLE',
  thinking: '● THINKING',
  tool: '● TOOL',
  typing: '● TYPING',
};

function costClass(cost) {
  if (!cost || cost < 0.10) return 'cost-green';
  if (cost < 1.00)          return 'cost-amber';
  return 'cost-red';
}

function renderPixelView() {
  const grid = document.getElementById('pixel-grid');
  if (!grid) return;

  const sessions = Object.values(state.sessions)
    .filter(matchesFilter)
    .sort((a, b) => new Date(b.lastActive || 0) - new Date(a.lastActive || 0));

  // Track which IDs we rendered
  const currentIds = new Set(sessions.map(s => s.id));

  // Remove stale cards
  [...grid.querySelectorAll('.agent-card')].forEach(card => {
    if (!currentIds.has(card.dataset.id)) {
      delete sessionState[card.dataset.id];
      card.remove();
    }
  });

  sessions.forEach(sess => {
    const id  = sess.id;
    const ss  = sessionState[id] || { state: 'idle', toolName: null };
    const spriteState = ss.state || 'idle';
    const cost = sess.totalCostUSD || 0;
    const sessActive = sess.isActive !== false;
    const projectName = truncate(sess.projectName || sess.name || id.slice(0, 8), 14);
    const toolDisplay = spriteState === 'tool' && ss.toolName
      ? truncate(ss.toolName, 12)
      : '';

    let card = grid.querySelector(`.agent-card[data-id="${id}"]`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'agent-card';
      card.dataset.id = id;
      card.innerHTML = `
        <div class="sprite-container">
          <span class="sprite"></span>
        </div>
        <div class="agent-name"></div>
        <div class="agent-cost"></div>
        <div class="agent-status"></div>
        <div class="agent-tool"></div>
      `;
      grid.appendChild(card);
    }

    // Update state
    card.dataset.state = spriteState;
    card.className = 'agent-card' + (!sessActive ? ' dead' : '');

    card.querySelector('.agent-name').textContent = projectName;

    const costEl = card.querySelector('.agent-cost');
    costEl.textContent = '$' + cost.toFixed(4);
    costEl.className = 'agent-cost ' + costClass(cost);

    const statusEl = card.querySelector('.agent-status');
    statusEl.textContent = STATE_LABELS[spriteState] || '● IDLE';
    statusEl.className = 'agent-status state-' + spriteState;

    card.querySelector('.agent-tool').textContent = toolDisplay;

    // Render sprite
    const spriteEl = card.querySelector('.sprite');
    renderSprite(spriteState, spriteEl);
  });
}

// ── Formatting helpers ─────────────────────────────────────────
function formatCost(n) {
  if (!n || isNaN(n)) return '$0.00';
  if (n >= 100) return '$' + Math.round(n);
  if (n >= 10) return '$' + n.toFixed(1);
  if (n >= 1) return '$' + n.toFixed(2);
  if (n >= 0.01) return '$' + n.toFixed(3);
  return '$' + n.toFixed(4);
}

function formatTokens(n) {
  if (!n || isNaN(n)) return '0';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function formatAge(ts) {
  if (!ts) return '—';
  const d = Date.now() - new Date(ts).getTime();
  const s = Math.floor(d / 1000);
  if (s < 60)   return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60)   return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)   return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatTime(ts) {
  const d = ts ? new Date(ts) : new Date();
  return d.toTimeString().slice(0, 8);
}

function truncate(s, n) {
  if (!s) return '';
  s = String(s);
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function isActive(session) {
  if (!session.lastActive) return false;
  return (Date.now() - new Date(session.lastActive).getTime()) < 30_000;
}

// ── Top bar ────────────────────────────────────────────────────
function updateTopBar() {
  const sessions = Object.values(state.sessions);
  const activeSessions = sessions.filter(isActive);

  // Total spend across all sessions
  const totalCost = sessions.reduce((a, s) => a + (s.totalCostUSD || 0), 0);

  // Active session cost
  const activeCost = activeSessions.reduce((a, s) => a + (s.totalCostUSD || 0), 0);

  // Cache hit: weighted average across active sessions
  let totalToks = 0, weightedPct = 0;
  activeSessions.forEach(s => {
    const tot = (s.inputTokens || 0) + (s.outputTokens || 0);
    totalToks += tot;
    if (tot > 0 && s.cacheHitPct != null) {
      weightedPct += s.cacheHitPct * tot;
    }
  });
  const cacheHit = totalToks > 0 ? Math.round(weightedPct / totalToks) : null;

  setStatVal('stat-sessions', activeSessions.length);
  setStatVal('stat-cost', formatCost(totalCost));
  setStatVal('stat-active-cost', formatCost(activeCost));
  setStatVal('stat-cache', cacheHit !== null ? cacheHit + '%' : '—');
}

function setStatVal(id, val) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }
}

// ── Session filtering ──────────────────────────────────────────
function isRecent(session) {
  if (!session.lastActive) return false;
  return (Date.now() - new Date(session.lastActive).getTime()) < 3600_000; // 1 hour
}

function matchesFilter(session) {
  if (state.sessionFilter === 'active') return isActive(session);
  if (state.sessionFilter === 'recent') return isRecent(session);
  return true; // 'all'
}

function setSessionFilter(filter) {
  state.sessionFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  renderSessions();
  if (state.currentView === 'pixels') renderPixelView();
}

function updateFilterCounts() {
  const all = Object.values(state.sessions);
  const active = all.filter(isActive).length;
  const recent = all.filter(isRecent).length;
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('filter-count-active', active);
  el('filter-count-recent', recent);
  el('filter-count-all', all.length);
}

// ── Sessions list ──────────────────────────────────────────────
function renderSessions() {
  const list = document.getElementById('sessions-list');
  const noSess = document.getElementById('no-sessions');
  const allSessions = Object.values(state.sessions)
    .sort((a, b) => new Date(b.lastActive || 0) - new Date(a.lastActive || 0));

  updateFilterCounts();

  if (allSessions.length === 0) {
    if (!noSess) {
      list.innerHTML = '<div id="no-sessions">AWAITING SESSIONS...</div>';
    }
    return;
  }
  if (noSess) noSess.remove();

  // Build hierarchy: group subagents under parents
  const parentSessions = allSessions.filter(s => !s.isSubagent);
  const subagentsByParent = {};
  allSessions.filter(s => s.isSubagent).forEach(s => {
    const pid = s.parentId || '__orphan__';
    if (!subagentsByParent[pid]) subagentsByParent[pid] = [];
    subagentsByParent[pid].push(s);
  });

  // Apply filter and build visible list
  const visibleItems = []; // {sess, isSubagent, childCount}
  parentSessions.forEach(p => {
    const children = subagentsByParent[p.id] || [];
    const parentMatches = matchesFilter(p);
    const activeChildren = children.filter(matchesFilter);
    // Show parent if it matches OR it has matching children
    if (parentMatches || activeChildren.length > 0) {
      visibleItems.push({ sess: p, isSubagent: false, childCount: children.length });
      // Show children only if parent is expanded
      if (state.expandedParents.has(p.id)) {
        const shownChildren = state.sessionFilter === 'all' ? children : activeChildren;
        shownChildren.forEach(c => {
          visibleItems.push({ sess: c, isSubagent: true, childCount: 0 });
        });
      }
    }
  });
  // Orphan subagents
  (subagentsByParent['__orphan__'] || []).filter(matchesFilter).forEach(c => {
    visibleItems.push({ sess: c, isSubagent: true, childCount: 0 });
  });

  // Clear list and rebuild (simpler than incremental DOM diffing for filtered views)
  list.innerHTML = '';

  if (visibleItems.length === 0) {
    list.innerHTML = '<div id="no-sessions" style="color:var(--text-dim);padding:20px;text-align:center;font-size:11px;">No sessions match filter</div>';
    return;
  }

  visibleItems.forEach(({ sess, isSubagent: isSub, childCount }) => {
    const active = isActive(sess);
    const selected = state.selectedSession === sess.id;
    const cacheHit = sess.cacheHitPct != null ? Math.round(sess.cacheHitPct) : null;
    const totalTok = (sess.inputTokens || 0) + (sess.outputTokens || 0);
    const expanded = state.expandedParents.has(sess.id);

    // Subagent toggle for parents with children
    const toggleHtml = (!isSub && childCount > 0)
      ? `<button class="subagent-toggle" onclick="event.stopPropagation(); toggleSubagents('${sess.id}')">${expanded ? '▾' : '▸'}</button><span class="subagent-count">${childCount}</span>`
      : '';

    const html = `
      <div class="session-row1">
        <span class="session-dot${active ? ' active' : ''}${sess.status === 'thinking' ? ' thinking' : ''}${sess.status === 'tool_use' ? ' tool' : ''}"></span>
        <span class="session-name">${truncate(sess.projectName || sess.name || sess.id, 20)}</span>
        ${toggleHtml}
        ${sess.status && sess.status !== 'idle' ? `<span class="session-status-badge status-${sess.status}">${sess.status === 'thinking' ? 'THINKING' : sess.status === 'tool_use' ? 'TOOL' : sess.status === 'waiting' ? 'WAITING' : 'LIVE'}</span>` : (active ? '<span class="session-active-badge">LIVE</span>' : '')}
      </div>
      <div class="session-stats">
        <span class="cost">${formatCost(sess.totalCostUSD)}</span>
        <span class="sep">·</span>
        <span class="tok">${formatTokens(totalTok)} tok</span>
        ${cacheHit !== null ? `<span class="sep">·</span><span class="cache">${cacheHit}% cache</span>` : ''}
      </div>
      <div class="session-meta">
        <span class="sid">${(sess.id || '').slice(0, 8)}</span>
        ${sess.model ? `<span class="sep">·</span><span class="model">${sess.model.replace('claude-','')}</span>` : ''}
        <span class="sep">·</span>
        <span>${formatAge(sess.lastActive)}</span>
      </div>
      <button class="replay-btn" onclick="event.stopPropagation(); openReplay('${escHtml(sess.id)}')" title="Replay session">⏵ REPLAY</button>
    `;

    const card = document.createElement('div');
    card.className = 'session-card' +
      (active ? ' active' : '') +
      (selected ? ' selected' : '') +
      (isSub ? ' subagent' : '');
    card.dataset.sid = sess.id;
    card.innerHTML = html;
    card.addEventListener('click', () => toggleSession(sess.id));
    list.appendChild(card);
  });
}

function toggleSubagents(parentId) {
  if (state.expandedParents.has(parentId)) {
    state.expandedParents.delete(parentId);
  } else {
    state.expandedParents.add(parentId);
  }
  renderSessions();
}

function toggleSession(id) {
  state.selectedSession = (state.selectedSession === id) ? null : id;
  renderSessions();
  updateFeedFilter();
}

function updateFeedFilter() {
  const lbl = document.getElementById('feed-filter-label');
  if (state.selectedSession) {
    const sess = state.sessions[state.selectedSession];
    const name = sess ? (sess.name || state.selectedSession.slice(0, 8)) : state.selectedSession.slice(0, 8);
    lbl.textContent = '▸ ' + name;
  } else {
    lbl.textContent = '';
  }
}

// ── Feed ───────────────────────────────────────────────────────
const MAX_FEED_ENTRIES = 500;

function getMessageText(msg) {
  if (!msg) return '';
  if (typeof msg.contentText === 'string' && msg.contentText) return msg.contentText;
  if (typeof msg.content === 'string') return msg.content;
  if (Array.isArray(msg.content)) {
    return msg.content.map(c => {
      if (typeof c === 'string') return c;
      if (c.type === 'text') return c.text || '';
      if (c.type === 'tool_use') return `${c.name}(${JSON.stringify(c.input || {}).slice(0, 60)})`;
      if (c.type === 'tool_result') {
        const r = Array.isArray(c.content) ? c.content.map(x => x.text || '').join(' ') : (c.content || '');
        return truncate(r, 80);
      }
      return JSON.stringify(c).slice(0, 80);
    }).filter(Boolean).join(' ');
  }
  return JSON.stringify(msg.content || '').slice(0, 120);
}

function getToolName(msg) {
  if (!msg) return '';
  if (Array.isArray(msg.content)) {
    const tu = msg.content.find(c => c.type === 'tool_use');
    return tu ? tu.name : '';
  }
  return msg.tool_name || msg.name || '';
}

function addFeedEntry(session, message) {
  if (!message) return;
  // Filter by selected session
  if (state.selectedSession && session.id !== state.selectedSession) return;
  // Skip empty/noise entries
  const text = getMessageText(message);
  if (!text && !message.toolName) return;
  if (text === '[thinking...]') return;

  const feed = document.getElementById('feed');
  const empty = document.getElementById('feed-empty');
  if (empty) empty.remove();

  // Trim old entries
  while (feed.children.length >= MAX_FEED_ENTRIES) {
    feed.removeChild(feed.firstChild);
  }

  const type = message.role || message.type || 'system';
  const ts   = message.timestamp || message.created_at || new Date().toISOString();
  const sid  = (session.id || '').slice(0, 6);

  let content = '';
  let contentClass = '';

  // Detect tool calls: backend sends toolName on assistant messages
  const toolName = message.toolName || getToolName(message);
  const isToolCall = toolName && (type === 'assistant' || type === 'tool_use');
  const isToolResult = type === 'tool_result' || (type === 'user' && state.lastToolEntry);

  if (isToolCall) {
    content = `[${toolName}] ${truncate(getMessageText(message), 80)}`;
    contentClass = 'tool';
  } else if (isToolResult) {
    content = truncate(getMessageText(message), 100);
    contentClass = 'result';
  } else if (type === 'user') {
    content = truncate(getMessageText(message), 120);
    contentClass = '';
  } else if (type === 'assistant') {
    content = truncate(getMessageText(message), 120);
    contentClass = '';
  } else {
    content = truncate(getMessageText(message), 120);
    contentClass = 'dim';
  }

  const displayType = isToolCall ? 'tool_use' : isToolResult ? 'tool_result' : type;
  const el = document.createElement('div');
  el.className = `feed-entry type-${displayType}`;
  el.innerHTML =
    `<span class="fe-time">${formatTime(ts)}</span>` +
    `<span class="fe-type ${displayType}">[${displayType}]</span>` +
    `<span class="fe-content ${contentClass}">${escHtml(content)}</span>` +
    `<span class="fe-sid">${escHtml(sid)}</span>`;

  if (isToolCall) {
    el.classList.add('tool-group-start');
    state.lastToolEntry = el;
  } else if (isToolResult && state.lastToolEntry) {
    el.classList.add('tool-group-end');
    state.lastToolEntry = null;
  } else {
    state.lastToolEntry = null;
  }

  feed.appendChild(el);
  state.eventCount++;
  document.getElementById('event-count').textContent = state.eventCount;

  if (state.autoScroll) {
    feed.scrollTop = feed.scrollHeight;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Scroll management ──────────────────────────────────────────
function resumeScroll() {
  state.autoScroll = true;
  const feed = document.getElementById('feed');
  feed.scrollTop = feed.scrollHeight;
  document.getElementById('scroll-lock-btn').classList.remove('visible');
}

document.getElementById('feed').addEventListener('scroll', function() {
  const feed = this;
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
  if (atBottom) {
    state.autoScroll = true;
    document.getElementById('scroll-lock-btn').classList.remove('visible');
  } else {
    state.autoScroll = false;
    document.getElementById('scroll-lock-btn').classList.add('visible');
  }
});

// ── Replay Player ──────────────────────────────────────────────

async function openReplay(sessionId) {
  closeReplayStream();
  state.replay.sessionId = sessionId;
  state.replay.currentIndex = 0;
  state.replay.events = [];

  // Show replay panel, hide live feed.
  document.getElementById('replay-panel').style.display = 'flex';
  document.getElementById('feed-panel').style.display = 'none';

  // Label
  const sess = state.sessions[sessionId];
  const label = sess ? (sess.projectName || sessionId.slice(0, 8)) : sessionId.slice(0, 8);
  document.getElementById('replay-session-label').textContent = label;

  // Fetch manifest.
  try {
    const resp = await fetch(`/api/sessions/${sessionId}/replay`);
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();
    state.replay.events = data.events || [];
  } catch (e) {
    document.getElementById('replay-empty').textContent = 'Failed to load session: ' + e.message;
    return;
  }

  const total = state.replay.events.length;
  const scrubber = document.getElementById('replay-scrubber');
  scrubber.max = Math.max(0, total - 1);
  scrubber.value = 0;
  document.getElementById('replay-progress').textContent = `0 / ${total}`;
  document.getElementById('replay-empty').textContent = 'PRESS PLAY TO BEGIN';
}

function closeReplay() {
  closeReplayStream();
  document.getElementById('replay-panel').style.display = 'none';
  document.getElementById('feed-panel').style.display = '';
  state.replay.sessionId = null;
}

function closeReplayStream() {
  if (state.replay.es) {
    state.replay.es.close();
    state.replay.es = null;
  }
  state.replay.playing = false;
  updateReplayPlayBtn();
}

function replayToggle() {
  if (state.replay.playing) {
    closeReplayStream();
  } else {
    startReplayStream(state.replay.currentIndex);
  }
}

function replayRestart() {
  closeReplayStream();
  state.replay.currentIndex = 0;
  document.getElementById('replay-scrubber').value = 0;
  document.getElementById('replay-progress').textContent = `0 / ${state.replay.events.length}`;
  // Clear feed
  const feed = document.getElementById('replay-feed');
  feed.innerHTML = '';
  startReplayStream(0);
}

function startReplayStream(fromIndex) {
  if (!state.replay.sessionId) return;
  closeReplayStream();

  const speed = parseFloat(document.getElementById('replay-speed').value) || 1;
  state.replay.playing = true;
  updateReplayPlayBtn();

  const url = `/api/sessions/${state.replay.sessionId}/replay/stream?from=${fromIndex}&speed=${speed}`;
  const es = new EventSource(url);
  state.replay.es = es;

  es.addEventListener('message', (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    state.replay.currentIndex = msg.index + 1;
    document.getElementById('replay-scrubber').value = msg.index;
    document.getElementById('replay-progress').textContent = `${msg.index + 1} / ${state.replay.events.length}`;
    addReplayEntry(msg);
  });

  es.addEventListener('done', () => {
    closeReplayStream();
  });

  es.onerror = () => {
    closeReplayStream();
  };
}

function updateReplayPlayBtn() {
  const btn = document.getElementById('replay-play-btn');
  if (btn) btn.textContent = state.replay.playing ? '⏸ PAUSE' : '▶ PLAY';
}

function addReplayEntry(msg) {
  const feed = document.getElementById('replay-feed');
  if (!feed) return;
  const empty = feed.querySelector('#replay-empty');
  if (empty) empty.remove();

  const type = msg.role || msg.type || 'system';
  const ts   = msg.timestamp ? new Date(msg.timestamp).toTimeString().slice(0,8) : '—';
  const toolName = msg.toolName;

  let typeColor = 'var(--text-dim)';
  let typeLabel = type.toUpperCase();
  if (type === 'user')      { typeColor = 'var(--blue)';   typeLabel = 'USER'; }
  if (type === 'assistant') { typeColor = 'var(--green)';  typeLabel = 'ASST'; }
  if (toolName)             { typeColor = 'var(--yellow)'; typeLabel = 'TOOL'; }

  const cost = msg.costUSD ? ` <span style="color:var(--text-dim)">${'$' + msg.costUSD.toFixed(4)}</span>` : '';
  const preview = escHtml(msg.contentText || (toolName ? `[${toolName}]` : ''));

  const el = document.createElement('div');
  el.className = 'feed-entry';
  el.style.borderLeft = `2px solid ${typeColor}`;
  el.innerHTML = `<span style="color:var(--text-dim)">${ts}</span> <span style="color:${typeColor}">${typeLabel}</span>${cost} <span style="color:var(--text)">${preview}</span>`;
  feed.appendChild(el);

  // Auto-scroll replay feed.
  feed.scrollTop = feed.scrollHeight;
}

// ── WebSocket ──────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}/ws`;

  document.getElementById('sb-host').textContent = location.host;

  try {
    const ws = new WebSocket(url);
    state.ws = ws;

    ws.onopen = () => {
      state.wsRetryDelay = 1000;
      setConnected(true);
    };

    ws.onmessage = (ev) => {
      let data;
      try { data = JSON.parse(ev.data); } catch { return; }
      handleWsMessage(data);
    };

    ws.onclose = () => {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = () => {
      ws.close();
    };

  } catch (e) {
    setConnected(false);
    scheduleReconnect();
  }
}

function updateSessionState(id, session, message) {
  if (!sessionState[id]) {
    sessionState[id] = { state: 'idle', toolName: null };
  }
  // Use backend-provided status when available
  if (session && session.status) {
    sessionState[id].state = session.status === 'tool_use' ? 'tool' : session.status;
  }
  if (session && session.isActive === false) {
    sessionState[id].state = 'idle';
    sessionState[id].toolName = null;
    return;
  }
  // Track tool name locally for display
  if (message) {
    const toolName = message.toolName || getToolName(message);
    if (toolName) {
      sessionState[id].toolName = toolName;
    } else if (message.role === 'user') {
      sessionState[id].toolName = null;
    } else if (message.role === 'assistant') {
      sessionState[id].toolName = null;
    }
  }
}

function handleWsMessage(data) {
  const { event, session, message } = data;

  if (!event) return;

  if (event === 'session_new' || event === 'session_update') {
    if (session) {
      state.sessions[session.id] = { ...(state.sessions[session.id] || {}), ...session };
      updateSessionState(session.id, session, null);
      renderSessions();
      updateTopBar();
      if (state.currentView === 'pixels') renderPixelView();
    }
  }

  if (event === 'message' && session && message) {
    state.sessions[session.id] = { ...(state.sessions[session.id] || {}), ...session };
    updateSessionState(session.id, session, message);
    renderSessions();
    updateTopBar();
    addFeedEntry(session, message);
    if (state.currentView === 'pixels') renderPixelView();
  }
}

function scheduleReconnect() {
  const delay = state.wsRetryDelay;
  state.wsRetryDelay = Math.min(state.wsRetryDelay * 2, 30_000);
  setTimeout(connect, delay);
}

function setConnected(yes) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (yes) {
    dot.className   = 'sb-dot connected';
    label.textContent = 'CONNECTED';
    label.className  = 'connected';
  } else {
    dot.className   = 'sb-dot disconnected';
    label.textContent = 'DISCONNECTED';
    label.className  = 'disconnected';
  }
}

// ── Initial load ───────────────────────────────────────────────
async function loadInitialSessions() {
  try {
    const resp = await fetch('/api/sessions');
    if (!resp.ok) return;
    const data = await resp.json();
    const sessions = Array.isArray(data) ? data : (data.sessions || []);
    sessions.forEach(s => {
      if (s && s.id) {
        state.sessions[s.id] = s;
        // Initialize all sessions to idle on first load
        if (!sessionState[s.id]) {
          sessionState[s.id] = { state: 'idle', toolName: null };
        }
      }
    });
    renderSessions();
    updateTopBar();
    if (state.currentView === 'pixels') renderPixelView();
  } catch (e) {
    // Server might not be up yet; WS will drive state
  }
}

// ── Age ticker ─────────────────────────────────────────────────
setInterval(() => {
  renderSessions();
}, 15_000);

// Scrubber seek — fires on mouseup/touchend (change event).
document.getElementById('replay-scrubber').addEventListener('change', (e) => {
  if (!state.replay.sessionId) return;
  const idx = parseInt(e.target.value);
  closeReplayStream();  // always close before starting a new stream
  state.replay.currentIndex = idx;
  // Clear feed and restart from seek point.
  document.getElementById('replay-feed').innerHTML = '';
  startReplayStream(idx);
});

// ── Boot ───────────────────────────────────────────────────────
loadInitialSessions();
connect();
</script>
