<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLAUDE MONITOR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --bg2:       #0f0f18;
    --bg3:       #13131f;
    --border:    #1e1e30;
    --border2:   #2a2a40;
    --text:      #e0e0e0;
    --text-dim:  #666680;
    --green:     #00ff88;
    --blue:      #4488ff;
    --yellow:    #ffcc00;
    --cyan:      #00ccff;
    --red:       #ff4444;
    --purple:    #cc88ff;
    --font:      'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.4;
  }

  body {
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 24px,
        rgba(255,255,255,0.012) 24px,
        rgba(255,255,255,0.012) 25px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.008) 39px,
        rgba(255,255,255,0.008) 40px
      );
  }

  /* ── Layout ─────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top Bar ─────────────────────────────────────────────── */
  #topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    height: 36px;
    padding: 0;
    user-select: none;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    border-right: 1px solid var(--border2);
    height: 100%;
    color: var(--green);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .brand-diamond {
    font-size: 16px;
    animation: diamondPulse 3s ease-in-out infinite;
  }

  @keyframes diamondPulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px var(--green)); }
    50%       { opacity: 0.6; filter: none; }
  }

  .topbar-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    border-right: 1px solid var(--border2);
    height: 100%;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: color 0.3s;
  }

  .topbar-stat .val {
    color: var(--text);
    font-weight: 600;
    font-size: 12px;
    transition: color 0.3s;
  }

  .topbar-stat .val.green  { color: var(--green); }
  .topbar-stat .val.yellow { color: var(--yellow); }
  .topbar-stat .val.cyan   { color: var(--cyan); }

  /* ── Main area ───────────────────────────────────────────── */
  #main {
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
  }

  /* ── Sessions Panel ──────────────────────────────────────── */
  #sessions-panel {
    flex: 0 0 30%;
    min-width: 220px;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border2);
    background: var(--bg2);
    overflow: hidden;
  }

  .panel-header {
    flex: 0 0 auto;
    padding: 7px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    text-transform: uppercase;
  }

  #sessions-list {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 6px;
  }

  #sessions-list::-webkit-scrollbar { width: 4px; }
  #sessions-list::-webkit-scrollbar-track { background: transparent; }
  #sessions-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .session-card {
    padding: 10px 10px 8px;
    margin-bottom: 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg3);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .session-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--border2);
    transition: background 0.2s;
  }

  .session-card:hover {
    border-color: var(--border2);
    background: #16162a;
  }

  .session-card.selected {
    border-color: var(--blue);
    background: rgba(68, 136, 255, 0.06);
    box-shadow: 0 0 12px rgba(68, 136, 255, 0.1);
  }

  .session-card.selected::before { background: var(--blue); }

  .session-card.active::before { background: var(--green); }
  .session-card.selected.active::before { background: var(--green); }

  .session-row1 {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
  }

  .session-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: 0 0 auto;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .session-dot.active {
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .session-name {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .session-active-badge {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--green);
    padding: 1px 5px;
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 2px;
    background: rgba(0,255,136,0.05);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .session-stats {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .session-stats .cost  { color: var(--yellow); }
  .session-stats .tok   { color: var(--cyan); }
  .session-stats .cache { color: var(--purple); }

  .session-meta {
    font-size: 10px;
    color: #44445a;
    display: flex;
    gap: 8px;
  }

  .session-meta .sid {
    font-family: var(--font);
    letter-spacing: 0.5px;
  }

  #no-sessions {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 40px 20px;
    letter-spacing: 1px;
  }

  /* ── Feed Panel ──────────────────────────────────────────── */
  #feed-panel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .feed-header {
    flex: 0 0 auto;
    padding: 7px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
  }

  #feed-filter-label {
    color: var(--blue);
    font-size: 10px;
  }

  #feed {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 0;
    font-family: var(--font);
    font-size: 12px;
  }

  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 2px 12px;
    border-left: 2px solid transparent;
    animation: fadeSlideIn 0.25s ease-out;
    transition: background 0.15s;
    line-height: 1.6;
  }

  .feed-entry:hover {
    background: rgba(255,255,255,0.03);
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fe-time {
    flex: 0 0 72px;
    color: #44445a;
    font-size: 11px;
    user-select: none;
  }

  .fe-type {
    flex: 0 0 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    user-select: none;
    padding-right: 8px;
  }

  .fe-type.user        { color: var(--blue); }
  .fe-type.assistant   { color: var(--green); }
  .fe-type.tool_use    { color: var(--yellow); }
  .fe-type.tool_result { color: var(--cyan); }
  .fe-type.error       { color: var(--red); }
  .fe-type.system      { color: var(--text-dim); }

  .feed-entry.type-user        { border-left-color: rgba(68,136,255,0.3); }
  .feed-entry.type-assistant   { border-left-color: rgba(0,255,136,0.25); }
  .feed-entry.type-tool_use    { border-left-color: rgba(255,204,0,0.3); }
  .feed-entry.type-tool_result { border-left-color: rgba(0,204,255,0.25); }
  .feed-entry.type-error       { border-left-color: rgba(255,68,68,0.4); }

  .fe-content {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }

  .fe-content.dim  { color: var(--text-dim); }
  .fe-content.tool { color: var(--yellow); }
  .fe-content.result { color: var(--cyan); opacity: 0.85; }

  .fe-sid {
    flex: 0 0 60px;
    text-align: right;
    color: #33334a;
    font-size: 10px;
    letter-spacing: 0.5px;
    user-select: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #feed-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 60px 20px;
    letter-spacing: 1px;
    line-height: 2;
  }

  /* ── Status Bar ──────────────────────────────────────────── */
  #statusbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
    height: 26px;
    background: var(--bg3);
    border-top: 1px solid var(--border2);
    font-size: 11px;
    color: var(--text-dim);
    user-select: none;
  }

  .sb-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 100%;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .sb-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    transition: background 0.4s, box-shadow 0.4s;
  }

  .sb-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sb-dot.disconnected { background: var(--red); }

  #conn-label {
    font-weight: 600;
    transition: color 0.4s;
  }

  #conn-label.connected    { color: var(--green); }
  #conn-label.disconnected { color: var(--red); }

  .sb-spacer { flex: 1; }

  #event-count {
    font-weight: 600;
    color: var(--text);
  }

  /* ── Scroll-lock indicator ───────────────────────────────── */
  #scroll-lock-btn {
    position: fixed;
    bottom: 38px;
    right: 14px;
    background: rgba(68,136,255,0.15);
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
  }

  #scroll-lock-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  #scroll-lock-btn:hover {
    background: rgba(68,136,255,0.25);
  }

  /* ── Misc ────────────────────────────────────────────────── */
  .sep { color: var(--border2); }

  .flash {
    animation: flashVal 0.5s ease-out;
  }

  @keyframes flashVal {
    0%   { color: var(--green); }
    100% { color: inherit; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top Bar -->
  <div id="topbar">
    <div class="topbar-brand">
      <span class="brand-diamond">◆</span>
      CLAUDE MONITOR
    </div>
    <div class="topbar-stat">
      <span>SESSIONS</span>
      <span class="val green" id="stat-sessions">0</span>
    </div>
    <div class="topbar-stat">
      <span>TODAY</span>
      <span class="val yellow" id="stat-cost">$0.000</span>
    </div>
    <div class="topbar-stat">
      <span>CACHE HIT</span>
      <span class="val cyan" id="stat-cache">—</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sessions Panel -->
    <div id="sessions-panel">
      <div class="panel-header">SESSIONS</div>
      <div id="sessions-list">
        <div id="no-sessions">AWAITING SESSIONS...</div>
      </div>
    </div>

    <!-- Feed Panel -->
    <div id="feed-panel">
      <div class="feed-header">
        <span>LIVE FEED</span>
        <span id="feed-filter-label"></span>
      </div>
      <div id="feed">
        <div id="feed-empty">
          WAITING FOR EVENTS...<br>
          <span style="color:#33334a;font-size:10px;">ws://${location.host}/ws</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="sb-item">
      <span class="sb-dot disconnected" id="conn-dot"></span>
      <span id="conn-label" class="disconnected">DISCONNECTED</span>
    </div>
    <div class="sb-item" id="sb-host">—</div>
    <div class="sb-item">
      <span id="event-count">0</span>&nbsp;EVENTS
    </div>
    <div class="sb-spacer"></div>
    <div class="sb-item" style="border-right:none; border-left:1px solid var(--border); color:#33334a; font-size:10px; letter-spacing:1px;">
      CLAUDE MONITOR v1.0
    </div>
  </div>

</div>

<!-- Scroll-to-bottom button -->
<button id="scroll-lock-btn" onclick="resumeScroll()">▼ RESUME SCROLL</button>

<script>
// ── State ──────────────────────────────────────────────────────
const state = {
  sessions: {},        // id -> session
  selectedSession: null,
  eventCount: 0,
  autoScroll: true,
  wsRetryDelay: 1000,
  ws: null,
};

// ── Formatting helpers ─────────────────────────────────────────
function formatCost(n) {
  if (!n || isNaN(n)) return '$0.000';
  if (n < 0.001) return '$0.0000';
  return '$' + n.toFixed(3);
}

function formatTokens(n) {
  if (!n || isNaN(n)) return '0';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function formatAge(ts) {
  if (!ts) return '—';
  const d = Date.now() - new Date(ts).getTime();
  const s = Math.floor(d / 1000);
  if (s < 60)   return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60)   return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)   return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatTime(ts) {
  const d = ts ? new Date(ts) : new Date();
  return d.toTimeString().slice(0, 8);
}

function truncate(s, n) {
  if (!s) return '';
  s = String(s);
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function isActive(session) {
  if (!session.lastActive) return false;
  return (Date.now() - new Date(session.lastActive).getTime()) < 30_000;
}

// ── Top bar ────────────────────────────────────────────────────
function updateTopBar() {
  const sessions = Object.values(state.sessions);
  const count = sessions.length;

  // Cost: sum of all totalCostUSD
  const cost = sessions.reduce((a, s) => a + (s.totalCostUSD || 0), 0);

  // Cache hit: weighted average by total tokens
  let totalToks = 0, cachedToks = 0;
  sessions.forEach(s => {
    const tot = (s.inputTokens || 0) + (s.outputTokens || 0);
    const cached = s.cacheReadTokens || 0;
    totalToks += tot;
    cachedToks += cached;
  });
  const cacheHit = totalToks > 0 ? Math.round((cachedToks / totalToks) * 100) : null;

  setStatVal('stat-sessions', count);
  setStatVal('stat-cost', formatCost(cost));
  setStatVal('stat-cache', cacheHit !== null ? cacheHit + '%' : '—');
}

function setStatVal(id, val) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }
}

// ── Sessions list ──────────────────────────────────────────────
function renderSessions() {
  const list = document.getElementById('sessions-list');
  const noSess = document.getElementById('no-sessions');
  const sessions = Object.values(state.sessions)
    .sort((a, b) => new Date(b.lastActive || 0) - new Date(a.lastActive || 0));

  if (sessions.length === 0) {
    if (!noSess) {
      list.innerHTML = '<div id="no-sessions">AWAITING SESSIONS...</div>';
    }
    return;
  }

  // Remove "no sessions" placeholder
  if (noSess) noSess.remove();

  // Update or create cards
  const existing = new Set([...list.querySelectorAll('.session-card')].map(el => el.dataset.sid));
  const current  = new Set(sessions.map(s => s.id));

  // Remove stale
  existing.forEach(sid => {
    if (!current.has(sid)) {
      const el = list.querySelector(`[data-sid="${sid}"]`);
      if (el) el.remove();
    }
  });

  sessions.forEach((sess, idx) => {
    let card = list.querySelector(`[data-sid="${sess.id}"]`);
    const active = isActive(sess);
    const selected = state.selectedSession === sess.id;
    const cacheHit = (() => {
      const tot = (sess.inputTokens || 0) + (sess.outputTokens || 0);
      if (!tot) return null;
      return Math.round(((sess.cacheReadTokens || 0) / tot) * 100);
    })();
    const totalTok = (sess.inputTokens || 0) + (sess.outputTokens || 0);

    const html = `
      <div class="session-row1">
        <span class="session-dot${active ? ' active' : ''}"></span>
        <span class="session-name">${truncate(sess.name || sess.id, 22)}</span>
        ${active ? '<span class="session-active-badge">LIVE</span>' : ''}
      </div>
      <div class="session-stats">
        <span class="cost">${formatCost(sess.totalCostUSD)}</span>
        <span class="sep">·</span>
        <span class="tok">${formatTokens(totalTok)} tok</span>
        ${cacheHit !== null ? `<span class="sep">·</span><span class="cache">${cacheHit}% cache</span>` : ''}
      </div>
      <div class="session-meta">
        <span class="sid">${(sess.id || '').slice(0, 8)}</span>
        <span class="sep">·</span>
        <span>${formatAge(sess.lastActive)}</span>
      </div>
    `;

    if (!card) {
      card = document.createElement('div');
      card.className = 'session-card';
      card.dataset.sid = sess.id;
      card.addEventListener('click', () => toggleSession(sess.id));
      // Insert at correct position
      const cards = [...list.querySelectorAll('.session-card')];
      if (cards[idx]) {
        list.insertBefore(card, cards[idx]);
      } else {
        list.appendChild(card);
      }
    }

    card.innerHTML = html;
    card.className = 'session-card' +
      (active    ? ' active'   : '') +
      (selected  ? ' selected' : '');
  });
}

function toggleSession(id) {
  state.selectedSession = (state.selectedSession === id) ? null : id;
  renderSessions();
  updateFeedFilter();
}

function updateFeedFilter() {
  const lbl = document.getElementById('feed-filter-label');
  if (state.selectedSession) {
    const sess = state.sessions[state.selectedSession];
    const name = sess ? (sess.name || state.selectedSession.slice(0, 8)) : state.selectedSession.slice(0, 8);
    lbl.textContent = '▸ ' + name;
  } else {
    lbl.textContent = '';
  }
}

// ── Feed ───────────────────────────────────────────────────────
const MAX_FEED_ENTRIES = 500;

function getMessageText(msg) {
  if (!msg) return '';
  if (typeof msg.content === 'string') return msg.content;
  if (Array.isArray(msg.content)) {
    return msg.content.map(c => {
      if (typeof c === 'string') return c;
      if (c.type === 'text') return c.text || '';
      if (c.type === 'tool_use') return `${c.name}(${JSON.stringify(c.input || {}).slice(0, 60)})`;
      if (c.type === 'tool_result') {
        const r = Array.isArray(c.content) ? c.content.map(x => x.text || '').join(' ') : (c.content || '');
        return truncate(r, 80);
      }
      return JSON.stringify(c).slice(0, 80);
    }).filter(Boolean).join(' ');
  }
  return JSON.stringify(msg.content || '').slice(0, 120);
}

function getToolName(msg) {
  if (!msg) return '';
  if (Array.isArray(msg.content)) {
    const tu = msg.content.find(c => c.type === 'tool_use');
    return tu ? tu.name : '';
  }
  return msg.tool_name || msg.name || '';
}

function addFeedEntry(session, message) {
  // Filter by selected session
  if (state.selectedSession && session.id !== state.selectedSession) return;

  const feed = document.getElementById('feed');
  const empty = document.getElementById('feed-empty');
  if (empty) empty.remove();

  // Trim old entries
  while (feed.children.length >= MAX_FEED_ENTRIES) {
    feed.removeChild(feed.firstChild);
  }

  const type = message.role || message.type || 'system';
  const ts   = message.timestamp || message.created_at || new Date().toISOString();
  const sid  = (session.id || '').slice(0, 6);

  let content = '';
  let contentClass = '';

  if (type === 'user') {
    content = truncate(getMessageText(message), 120);
    contentClass = '';
  } else if (type === 'assistant') {
    // Check if it's a tool use
    const toolName = getToolName(message);
    if (toolName) {
      // Will be rendered as tool_use type separately, skip
      content = truncate(getMessageText(message), 120);
      contentClass = '';
    } else {
      content = truncate(getMessageText(message), 120);
      contentClass = '';
    }
  } else if (type === 'tool_use') {
    content = message.name || message.tool_name || truncate(getMessageText(message), 80);
    contentClass = 'tool';
  } else if (type === 'tool_result') {
    content = truncate(getMessageText(message), 100);
    contentClass = 'result';
  } else {
    content = truncate(getMessageText(message), 120);
    contentClass = 'dim';
  }

  const el = document.createElement('div');
  el.className = `feed-entry type-${type}`;
  el.innerHTML =
    `<span class="fe-time">${formatTime(ts)}</span>` +
    `<span class="fe-type ${type}">[${type}]</span>` +
    `<span class="fe-content ${contentClass}">${escHtml(content)}</span>` +
    `<span class="fe-sid">${escHtml(sid)}</span>`;

  feed.appendChild(el);
  state.eventCount++;
  document.getElementById('event-count').textContent = state.eventCount;

  if (state.autoScroll) {
    feed.scrollTop = feed.scrollHeight;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Scroll management ──────────────────────────────────────────
function resumeScroll() {
  state.autoScroll = true;
  const feed = document.getElementById('feed');
  feed.scrollTop = feed.scrollHeight;
  document.getElementById('scroll-lock-btn').classList.remove('visible');
}

document.getElementById('feed').addEventListener('scroll', function() {
  const feed = this;
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
  if (atBottom) {
    state.autoScroll = true;
    document.getElementById('scroll-lock-btn').classList.remove('visible');
  } else {
    state.autoScroll = false;
    document.getElementById('scroll-lock-btn').classList.add('visible');
  }
});

// ── WebSocket ──────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}/ws`;

  document.getElementById('sb-host').textContent = location.host;

  try {
    const ws = new WebSocket(url);
    state.ws = ws;

    ws.onopen = () => {
      state.wsRetryDelay = 1000;
      setConnected(true);
    };

    ws.onmessage = (ev) => {
      let data;
      try { data = JSON.parse(ev.data); } catch { return; }
      handleWsMessage(data);
    };

    ws.onclose = () => {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = () => {
      ws.close();
    };

  } catch (e) {
    setConnected(false);
    scheduleReconnect();
  }
}

function handleWsMessage(data) {
  const { event, session, message } = data;

  if (!event) return;

  if (event === 'session_new' || event === 'session_update') {
    if (session) {
      state.sessions[session.id] = { ...(state.sessions[session.id] || {}), ...session };
      renderSessions();
      updateTopBar();
    }
  }

  if (event === 'message' && session && message) {
    state.sessions[session.id] = { ...(state.sessions[session.id] || {}), ...session };
    renderSessions();
    updateTopBar();
    addFeedEntry(session, message);
  }
}

function scheduleReconnect() {
  const delay = state.wsRetryDelay;
  state.wsRetryDelay = Math.min(state.wsRetryDelay * 2, 30_000);
  setTimeout(connect, delay);
}

function setConnected(yes) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (yes) {
    dot.className   = 'sb-dot connected';
    label.textContent = 'CONNECTED';
    label.className  = 'connected';
  } else {
    dot.className   = 'sb-dot disconnected';
    label.textContent = 'DISCONNECTED';
    label.className  = 'disconnected';
  }
}

// ── Initial load ───────────────────────────────────────────────
async function loadInitialSessions() {
  try {
    const resp = await fetch('/api/sessions');
    if (!resp.ok) return;
    const data = await resp.json();
    const sessions = Array.isArray(data) ? data : (data.sessions || []);
    sessions.forEach(s => {
      if (s && s.id) state.sessions[s.id] = s;
    });
    renderSessions();
    updateTopBar();
  } catch (e) {
    // Server might not be up yet; WS will drive state
  }
}

// ── Age ticker ─────────────────────────────────────────────────
setInterval(() => {
  renderSessions();
}, 15_000);

// ── Boot ───────────────────────────────────────────────────────
loadInitialSessions();
connect();
</script>
